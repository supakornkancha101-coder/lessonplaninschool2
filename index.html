    // --- UI Components ---
    function PwField({ value, onChange, placeholder, onEnter, extraStyle }) {

      const base = { fontFamily: "Nunito,sans-serif", border: `2px solid ${P.border}`, borderRadius: 12, padding: "9px 44px 9px 12px", fontSize: 14, background: P.pinkS, color: P.text, width: "100%", outline: "none" };
      return (

          <input type={show ? "text" : "password"} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} onKeyDown={e => e.key === "Enter" && onEnter && onEnter()} style={{ ...base, ...extraStyle }} />
          <button type="button" onClick={() => setShow(v => !v)} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 18, padding: "4px", color: P.muted, lineHeight: 1 }}>{show ? "🙈" : "👁️"}</button>
        </div>
      );
    }

    function DrumCol({ items, value, onChange, width }) {
      const ITEM_H = 44, CENTER = 2, listRef = useRef(null), drag = useRef(false), startY = useRef(0), startT = useRef(0), velY = useRef(0), lastY = useRef(0), topRef = useRef(0), animRef = useRef(null);
      const snapTo = useCallback((idx, animate) => {
        const i = Math.max(0, Math.min(items.length - 1, idx));
        const target = -(i * ITEM_H) + CENTER * ITEM_H;
        if (!animate) { topRef.current = target; if (listRef.current) listRef.current.style.transform = `translateY(${target}px)`; return; }
        const start = topRef.current, dist = target - start, dur = 260, t0 = performance.now(), ease = t => 1 - Math.pow(1 - t, 3);
        const step = now => {
          const prog = Math.min((now - t0) / dur, 1), cur = start + dist * ease(prog);
          topRef.current = cur; if (listRef.current) listRef.current.style.transform = `translateY(${cur}px)`;
          if (prog < 1) { animRef.current = requestAnimationFrame(step); } else { onChange(items[i].val); }
        };
        if (animRef.current) cancelAnimationFrame(animRef.current); animRef.current = requestAnimationFrame(step);
      }, [items, onChange]);

      const curIdx = () => Math.round(Math.max(0, Math.min(items.length - 1, -(topRef.current - CENTER * ITEM_H) / ITEM_H)));
      useEffect(() => { const i = items.findIndex(x => String(x.val) === String(value)); snapTo(i >= 0 ? i : 0, false); }, []); 
      useEffect(() => { const i = items.findIndex(x => String(x.val) === String(value)); if (i >= 0) snapTo(i, false); }, [value]); 
      const hilight = i => { if (!listRef.current) return; [...listRef.current.children].forEach((c, j) => c.classList.toggle("on", j === i)); };
      const onDown = e => { e.currentTarget.setPointerCapture(e.pointerId); drag.current = true; startY.current = e.clientY; startT.current = topRef.current; lastY.current = e.clientY; velY.current = 0; if (animRef.current) cancelAnimationFrame(animRef.current); };
      const onMove = e => { if (!drag.current) return; velY.current = e.clientY - lastY.current; lastY.current = e.clientY; const next = startT.current + (e.clientY - startY.current); topRef.current = next; if (listRef.current) listRef.current.style.transform = `translateY(${next}px)`; hilight(curIdx()); };
      const onUp = () => { if (!drag.current) return; drag.current = false; const target = topRef.current + velY.current * 8; const snapped = Math.round(Math.max(0, Math.min(items.length - 1, -(target - CENTER * ITEM_H) / ITEM_H))); snapTo(snapped, true); setTimeout(() => hilight(snapped), 280); };
      const visIdx = items.findIndex(x => String(x.val) === String(value));

      return (
        <div style={{ width, position: "relative", userSelect: "none" }}>
          <div className="drumWrap" onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerCancel={onUp}>
            <div className="drumLine" /><div className="drumFT" /><div className="drumFB" />
            <div ref={listRef} className="drumList">
              {items.map((item, i) => (<div key={item.val} className={`drumItem${i === visIdx ? " on" : ""}`} onClick={() => snapTo(i, true)}>{item.label}</div>))}
            </div>
          </div>
        </div>
      );
    }

    function TimePicker({ value, onDone, onClose, label }) {
      const [hh, mm] = fromStr(value || "08:00");
      const [curH, setCurH] = useState(hh), [curM, setCurM] = useState(mm), [typH, setTypH] = useState(String(hh)), [typM, setTypM] = useState(pad(mm)), [mode, setMode] = useState("drum");
      const hours = Array.from({ length: 24 }, (_, i) => ({ val: i, label: pad(i) })), minutes = Array.from({ length: 12 }, (_, i) => ({ val: i * 5, label: pad(i * 5) })), drumM = Math.round(curM / 5) * 5 % 60;
      const onTypH = v => { setTypH(v); const n = parseInt(v); if (!isNaN(n) && n >= 0 && n <= 23) setCurH(n); };
      const onTypM = v => { setTypM(v); const n = parseInt(v); if (!isNaN(n) && n >= 0 && n <= 59) setCurM(n); };

      return (

              <button className="btnP" onClick={() => onDone(toStr(curH, curM))} style={{ flex: 1, justifyContent: "center", fontSize: 15 }}>✅ ยืนยัน</button><button className="btnG" onClick={onClose}>ยกเลิก</button>
            </div>
          </div>
        </div>
      );
    }

    function DatePicker({ value, onDone, onClose }) {
      const now = new Date(), initD = value ? new Date(value + "T12:00") : now;
      const [yr, setYr] = useState(initD.getFullYear()), [mo, setMo] = useState(initD.getMonth()), [dy, setDy] = useState(initD.getDate()), [mode, setMode] = useState("cal"), [typY, setTypY] = useState(String(initD.getFullYear())), [typM, setTypM] = useState(String(initD.getMonth() + 1)), [typD, setTypD] = useState(String(initD.getDate()));
      const dim = new Date(yr, mo + 1, 0).getDate(), days = Array.from({ length: dim }, (_, i) => ({ val: i + 1, label: String(i + 1) })), mons = MONTHS.map((l, i) => ({ val: i, label: l })), years = Array.from({ length: 10 }, (_, i) => ({ val: now.getFullYear() - 2 + i, label: String(now.getFullYear() - 2 + i) }));

      const firstDow = new Date(yr, mo, 1).getDay(); const calCells = []; for (let i = 0; i < firstDow; i++) calCells.push(null); for (let i = 1; i <= dim; i++) calCells.push(i);
      const isToday = d => d && d === now.getDate() && mo === now.getMonth() && yr === now.getFullYear();
      const prevMo = () => { if (mo === 0) { setMo(11); setYr(y => y - 1); } else { setMo(m => m - 1); } }, nextMo = () => { if (mo === 11) { setMo(0); setYr(y => y + 1); } else { setMo(m => m + 1); } };

      return (
        <div className="overlay fadeIn" onClick={onClose}>
          <div className="bsheet sheet" onClick={e => e.stopPropagation()}>
            <div className="handle" />
            <div style={{ padding: "0 20px 8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>

                <div style={{ display: "flex", gap: 6, marginBottom: 10, overflowX: "auto", paddingBottom: 4 }}>{years.map(y => (<button key={y.val} onClick={() => setYr(y.val)} style={{ flexShrink: 0, fontSize: 12, padding: "4px 12px", borderRadius: 50, border: "2px solid", cursor: "pointer", fontFamily: "Nunito,sans-serif", fontWeight: 800, borderColor: yr === y.val ? P.pink : P.border, background: yr === y.val ? P.pink : "#fff", color: yr === y.val ? "#fff" : P.muted }}>{y.val}</button>))}</div>

        if (!reg.id || !reg.name || !regPw) return setErr("กรุณากรอกข้อมูลให้ครบทุกช่อง");
        if (regPw !== regPw2) return setErr("รหัสผ่านทั้งสองช่องไม่ตรงกัน");
        const uId = reg.id.trim();
        db.ref('users/' + uId).once('value').then(snap => {
          if (snap.exists()) return setErr("รหัสนักศึกษานี้ถูกใช้แล้ว");
          const u = { id: uId, name: reg.name.trim(), password: regPw };
          db.ref('users/' + uId).set(u).then(() => {
            sessionStorage.setItem("edu_sess6", JSON.stringify(u));
            setUser(u);
            setView("dash");
          });
        });
      };

      const logout = () => { sessionStorage.removeItem("edu_sess6"); setUser(null); setView("login"); setErr(""); };

      const commit = (rData, isEdit, targetId) => {
        const recId = isEdit ? targetId : Date.now();
        const payload = { ...rData, id: recId };
        db.ref(`records/${user.id}/${recId}`).set(payload).then(() => {
          setAdding(false);
          setEditId(null);
        });
      };

      const delRec = id => db.ref(`records/${user.id}/${id}`).remove();

      const teachH = recs.reduce((s, r) => s + (r.teachHours || 0), 0), othH = recs.reduce((s, r) => s + (r.otherHours || 0), 0), totH = teachH + othH, done = totH >= MIN_TOTAL && teachH >= MIN_EACH && othH >= MIN_EACH;
      const filtered = filter === "all" ? recs : filter === "teaching" ? recs.filter(r => (r.teachHours || 0) > 0) : recs.filter(r => (r.otherHours || 0) > 0);
      const inpBase = { fontFamily: "Nunito,sans-serif", border: `2px solid ${P.border}`, borderRadius: 12, padding: "9px 12px", fontSize: 14, background: P.pinkS, color: P.text, width: "100%", outline: "none" };

      if (view === "login") return (
        <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: "2rem 1rem", position: "relative", overflow: "hidden", background: P.bg, fontFamily: "Nunito,sans-serif" }}>
          <style>{css}</style>
          <div className="blob" style={{ width: 340, height: 340, background: P.pinkL, top: -100, left: -100 }} /><div className="blob" style={{ width: 260, height: 260, background: P.tealL, bottom: -60, right: -60 }} /><div className="blob" style={{ width: 180, height: 180, background: P.yellowL, top: "35%", right: "8%" }} />
          <div className="card pop" style={{ width: "100%", maxWidth: 420, position: "relative", zIndex: 1, border: `2px solid ${P.pinkL}`, padding: 28 }}>
            <div style={{ textAlign: "center", marginBottom: 24 }}><div style={{ fontSize: 54, marginBottom: 8 }}>📚✨</div><h2 style={{ fontSize: 22, fontWeight: 900, background: `linear-gradient(135deg,${P.pink},${P.purple})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>บันทึกชั่วโมงฝึกสอน</h2><p style={{ fontSize: 13, color: P.muted, marginTop: 4, fontWeight: 600 }}>EDU 01 — ระบบรายงานผลการปฏิบัติงาน</p></div>
            <div style={{ display: "flex", marginBottom: 20, background: P.pinkS, borderRadius: 50, padding: 4 }}>{[["login", "🔑 เข้าสู่ระบบ"], ["register", "🌸 ลงทะเบียน"]].map(([v, label]) => (<button key={v} onClick={() => { setTab(v); setErr(""); }} style={{ flex: 1, padding: "9px 0", fontSize: 13, border: "none", cursor: "pointer", borderRadius: 50, fontWeight: 800, fontFamily: "Nunito,sans-serif", transition: "all .2s", background: tab === v ? "#fff" : "transparent", color: tab === v ? P.pink : P.muted, boxShadow: tab === v ? `0 2px 12px ${P.pinkL}` : "none" }}>{label}</button>))}</div>
            {tab === "register" && (<div style={{ marginBottom: 14 }}><div className="fl">👤 ชื่อ-นามสกุล</div><input style={inpBase} placeholder="ชื่อของคุณ" value={reg.name} onChange={e => setReg({ ...reg, name: e.target.value })} /></div>)}
            <div style={{ marginBottom: 14 }}><div className="fl">🎓 รหัสนักศึกษา</div><input style={inpBase} placeholder="รหัสนักศึกษา" value={tab === "login" ? lg.id : reg.id} onChange={e => tab === "login" ? setLg({ ...lg, id: e.target.value }) : setReg({ ...reg, id: e.target.value })} /></div>
            <div style={{ marginBottom: tab === "register" ? 14 : 16 }}><div className="fl">🔒 รหัสผ่าน</div>{tab === "login" ? <PwField value={lg.password} onChange={v => setLg({ ...lg, password: v })} placeholder="รหัสผ่าน" onEnter={doLogin} /> : <PwField value={regPw} onChange={setRegPw} placeholder="รหัสผ่าน" />}</div>
            {tab === "register" && (<div style={{ marginBottom: 16 }}><div className="fl">🔒 ยืนยันรหัสผ่านอีกครั้ง</div><PwField value={regPw2} onChange={setRegPw2} placeholder="พิมพ์รหัสผ่านอีกครั้ง" onEnter={doReg} extraStyle={{ borderColor: regPw2 && regPw2 !== regPw ? "#E57389" : regPw2 && regPw2 === regPw ? "#4ECDC4" : P.border }} />{regPw2 && <div style={{ fontSize: 12, fontWeight: 700, marginTop: 5, color: regPw2 === regPw ? "#1A9E96" : "#E57389" }}>{regPw2 === regPw ? "✅ รหัสผ่านตรงกัน" : "❌ รหัสผ่านไม่ตรงกัน"}</div>}</div>)}
            {err && <div style={{ background: "#FFE8EE", border: "2px solid #FFCDD7", borderRadius: 12, padding: "10px 14px", fontSize: 13, color: "#E05370", marginBottom: 14, fontWeight: 700 }}>⚠️ {err}</div>}
            <button className="btnP" onClick={tab === "login" ? doLogin : doReg} style={{ width: "100%", justifyContent: "center", padding: "13px", fontSize: 15 }}>{tab === "login" ? "🚀 เข้าสู่ระบบ" : "🌟 ลงทะเบียนเลย"}</button>
            {tab === "login" && (<button onClick={() => setForgot(true)} style={{ display: "block", width: "100%", textAlign: "center", marginTop: 12, background: "none", border: "none", fontSize: 13, color: P.purple, cursor: "pointer", fontWeight: 800, fontFamily: "Nunito,sans-serif", textDecoration: "underline" }}>🔓 ลืมรหัสผ่าน?</button>)}
            <p style={{ textAlign: "center", fontSize: 11, color: P.muted, marginTop: 10, fontWeight: 600 }}>เชื่อมต่อข้อมูลผ่าน Cloud Sync ☁️</p>
          </div>
          {forgot && <ForgotPwModal onClose={() => setForgot(false)} />}
        </div>
      );

      return (
        <div className="app">
          <style>{css}</style>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}><div style={{ fontSize: 34 }}>📚</div><div><h2 style={{ fontSize: 19, fontWeight: 900 }}>รายงานผลการปฏิบัติงาน</h2><p style={{ fontSize: 12, color: P.muted, fontWeight: 700 }}>👩‍🎓 {user?.name} · {user?.id}</p></div></div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>{done && <span style={{ fontSize: 13, background: P.tealS, color: "#1A9E96", border: `2px solid ${P.tealL}`, borderRadius: 50, padding: "6px 16px", fontWeight: 900 }}>🎉 ครบตามเกณฑ์!</span>}<button className="btnG" onClick={() => setChangePw(true)} style={{ fontSize: 12, padding: "7px 14px" }}>🔑 เปลี่ยนรหัสผ่าน</button><button className="btnG" onClick={logout}>ออกจากระบบ 👋</button></div>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 12, marginBottom: 20 }}>
            <StatCard emoji="⏰" label="ชั่วโมงทั้งหมด" val={totH} target={180} color={P.pink} colorL={P.pinkL} /><StatCard emoji="📚" label="การปฏิบัติการสอน" val={teachH} target={90} color={P.teal} colorL={P.tealL} /><StatCard emoji="📋" label="งานอื่นๆ" val={othH} target={90} color={P.purple} colorL={P.purpleL} />
            <div className="card" style={{ display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", gap: 4 }}><div style={{ fontSize: 32 }}>🗒️</div><div style={{ fontSize: 11, color: P.muted, fontWeight: 700 }}>จำนวนครั้ง</div><div style={{ fontSize: 30, fontWeight: 900 }}>{recs.length}</div><div style={{ fontSize: 12, color: P.muted, fontWeight: 600 }}>ครั้ง</div></div>
          </div>

          <div className="card" style={{ padding: 0, overflow: "hidden" }}>
            <div style={{ padding: "14px 18px", borderBottom: `2px solid ${P.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, background: P.pinkS, borderRadius: "18px 18px 0 0" }}>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{[["all", "🗂️ ทั้งหมด"], ["teaching", "📚 สอน"], ["other", "📋 อื่นๆ"]].map(([v, label]) => (<button key={v} onClick={() => setFilter(v)} style={{ fontSize: 12, padding: "7px 16px", borderRadius: 50, border: "2px solid", cursor: "pointer", fontFamily: "Nunito,sans-serif", fontWeight: 800, transition: "all .15s", borderColor: filter === v ? P.pink : P.border, background: filter === v ? P.pink : "#fff", color: filter === v ? "#fff" : P.muted }}>{label} ({v === "all" ? recs.length : v === "teaching" ? recs.filter(r => (r.teachHours || 0) > 0).length : recs.filter(r => (r.otherHours || 0) > 0).length})</button>))}</div>
              <button className="btnP" onClick={() => { setAdding(true); setEditId(null); }}>✨ เพิ่มรายการ</button>
            </div>

            {adding && <RecordForm initial={EMPTY_ROW} title="🌟 เพิ่มรายการใหม่" bgColor={P.purpleS} onSave={d => commit(d, false, null)} onCancel={() => setAdding(false)} />}
            {editId !== null && (() => { const rec = recs.find(r => r.id === editId); return rec ? <RecordForm key={editId} initial={{ ...rec }} title="✏️ แก้ไขรายการ" bgColor="#FFFBF0" onSave={d => commit(d, true, editId)} onCancel={() => setEditId(null)} /> : null; })()}

            {filtered.length === 0 ? (
              <div style={{ textAlign: "center", padding: "3rem 1rem" }}><div style={{ fontSize: 60, marginBottom: 12 }}>🌸</div><p style={{ color: P.muted, fontWeight: 800, fontSize: 15 }}>ยังไม่มีรายการ</p><p style={{ color: P.muted, fontSize: 13, marginTop: 4 }}>กด "✨ เพิ่มรายการ" เพื่อเริ่มบันทึก</p></div>
            ) : (
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", minWidth: 540 }}>
                  <thead><tr style={{ background: P.pinkS }}>{["#", "วันที่", "เวลา", "รวม", "📚 สอน", "📋 อื่นๆ", "หมายเหตุ", ""].map(h => (<th key={h} style={{ padding: "10px 10px", textAlign: "left", fontSize: 11, fontWeight: 800, color: P.muted, borderBottom: `2px solid ${P.border}`, whiteSpace: "nowrap" }}>{h}</th>))}</tr></thead>
                  <tbody>{filtered.map((rec, i) => (<tr key={rec.id} className="row"><td style={{ padding: "11px 10px", fontSize: 12, color: P.muted, fontWeight: 800 }}>{i + 1}</td><td style={{ padding: "11px 10px", fontSize: 13, fontWeight: 800, whiteSpace: "nowrap" }}>{fmtDate(rec.date)}</td><td style={{ padding: "11px 10px", fontSize: 12, color: P.muted, whiteSpace: "nowrap", fontWeight: 700 }}>{rec.startTime} – {rec.endTime}</td><td style={{ padding: "11px 10px" }}><span style={{ background: `linear-gradient(135deg,${P.pink},${P.purple})`, color: "#fff", borderRadius: 50, padding: "4px 12px", fontSize: 13, fontWeight: 900, whiteSpace: "nowrap" }}>{(rec.totalHours || 0).toFixed(1)} ชม.</span></td><td style={{ padding: "11px 10px" }}><span className="tagT">{(rec.teachHours || 0).toFixed(1)} ชม.</span></td><td style={{ padding: "11px 10px" }}><span className="tagO">{(rec.otherHours || 0).toFixed(1)} ชม.</span></td><td style={{ padding: "11px 10px", fontSize: 12, color: P.muted, maxWidth: 110, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{rec.note || "—"}</td><td style={{ padding: "11px 10px" }}><div style={{ display: "flex", gap: 5 }}><button onClick={() => { setEditId(rec.id); setAdding(false); }} style={{ background: P.purpleS, border: `2px solid ${P.purpleL}`, borderRadius: 50, padding: "4px 10px", fontSize: 12, color: P.purple, cursor: "pointer", fontWeight: 800, fontFamily: "Nunito,sans-serif" }}>✏️</button><button onClick={() => delRec(rec.id)} style={{ background: "#FFF0F3", border: "2px solid #FFCDD7", borderRadius: 50, padding: "4px 10px", fontSize: 12, color: "#E57389", cursor: "pointer", fontWeight: 800, fontFamily: "Nunito,sans-serif" }}>🗑️</button></div></td></tr>))}</tbody>
                  <tfoot><tr style={{ background: P.pinkS }}><td colSpan={3} style={{ padding: "12px 10px", fontSize: 12, fontWeight: 800, color: P.muted, borderTop: `2px solid ${P.border}` }}>รวม ({filtered.length} รายการ)</td><td style={{ padding: "12px 10px", borderTop: `2px solid ${P.border}` }}><span style={{ background: `linear-gradient(135deg,${P.pink},${P.purple})`, color: "#fff", borderRadius: 50, padding: "4px 12px", fontSize: 13, fontWeight: 900 }}>{filtered.reduce((s, r) => s + (r.totalHours || 0), 0).toFixed(1)} ชม.</span></td><td style={{ padding: "12px 10px", borderTop: `2px solid ${P.border}` }}><span className="tagT">{filtered.reduce((s, r) => s + (r.teachHours || 0), 0).toFixed(1)} ชม.</span></td><td style={{ padding: "12px 10px", borderTop: `2px solid ${P.border}` }}><span className="tagO">{filtered.reduce((s, r) => s + (r.otherHours || 0), 0).toFixed(1)} ชม.</span></td><td colSpan={2} style={{ borderTop: `2px solid ${P.border}` }} /></tr></tfoot>
                </table>
              </div>
            )}
          </div>
          <p style={{ textAlign: "center", fontSize: 12, color: P.muted, marginTop: 16, fontWeight: 600 }}>🟢 เชื่อมต่อกับระบบ Cloud แล้ว · อัปเดตข้อมูลแบบเรียลไทม์</p>

          {changePw && (
            <ChangePwModal user={user} onClose={() => setChangePw(false)} onChanged={newPw => { const updated = { ...user, password: newPw }; setUser(updated); sessionStorage.setItem("edu_sess6", JSON.stringify(updated)); }} />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
